<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🛡️ نظام جواد للأمن السيبراني</title>
    <style>
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background: #0d1117; 
            color: white; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            margin: 0; 
        }
        .card { 
            background: #161b22; 
            border: 1px solid #30363d; 
            border-radius: 12px; 
            padding: 30px; 
            width: 90%; 
            max-width: 350px; 
            text-align: center; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.5); 
        }
        input, textarea { 
            width: 100%; 
            padding: 12px; 
            margin-bottom: 15px; 
            border-radius: 6px; 
            border: 1px solid #30363d; 
            background: #0d1117; 
            color: white; 
            box-sizing: border-box; 
            outline: none; 
        }
        textarea { 
            color: #39ff14; 
            font-family: monospace; 
            resize: none;
        }
        button { 
            width: 100%; 
            padding: 12px; 
            background: #238636; 
            color: white; 
            border: none; 
            border-radius: 6px; 
            font-weight: bold; 
            cursor: pointer; 
            font-size: 16px; 
            transition: 0.3s;
        }
        button:hover { 
            background: #2ea043; 
        }
        h2 { 
            color: #58a6ff; 
            margin-bottom: 20px; 
        }
        p {
            color: #8b949e;
            font-size: 14px;
        }
    </style>
</head>
<body>

</div>
